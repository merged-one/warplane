# ---------------------------------------------------------------------------
# Warplane — Docker Compose (Postgres-native)
#
# Usage:  docker compose up
# ---------------------------------------------------------------------------

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: warplane
      POSTGRES_USER: warplane
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-warplane-dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warplane"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  warplane:
    build: .
    ports:
      - "${WARPLANE_PORT:-3000}:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://warplane:${POSTGRES_PASSWORD:-warplane-dev}@postgres:5432/warplane
      - WARPLANE_CONFIG=/app/config/warplane.yaml
      - WARPLANE_LOG_LEVEL=${WARPLANE_LOG_LEVEL:-info}
      - DEMO_MODE=${DEMO_MODE:-true}
    volumes:
      - ./config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  pg-data:

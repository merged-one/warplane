# Warplane — Multi-Network Configuration (Mainnet + Fuji)
#
# Monitors both Avalanche Mainnet and Fuji Testnet simultaneously.
# Each chain runs its own independent RPC poller and event pipeline.
#
# Copy this file to config/warplane.yaml and customize for your deployment.

chains:
  # ── Mainnet ──────────────────────────────────────────────────────────
  - name: "Mainnet C-Chain"
    blockchainId: "2q9e4r6Mu3U68nU1fYjgbR6JvwrRx36CohpAX5UQxse55x1Q5"
    evmChainId: 43114
    rpcUrl: "https://api.avax.network/ext/bc/C/rpc"
    wsUrl: "wss://api.avax.network/ext/bc/C/ws"
    teleporterAddress: "0x253b2784c75e510dD0fF1da844684a1aC0aa5fcf"
    startBlock: 0

  # ── Fuji Testnet ─────────────────────────────────────────────────────
  - name: "Fuji C-Chain"
    blockchainId: "yH8D7ThNJkxmtkuv2jgBa4P1Rn3Qpr4pPr7QYNfcdoS6k6HWp"
    evmChainId: 43113
    rpcUrl: "https://api.avax-test.network/ext/bc/C/rpc"
    wsUrl: "wss://api.avax-test.network/ext/bc/C/ws"
    teleporterAddress: "0x253b2784c75e510dD0fF1da844684a1aC0aa5fcf"
    startBlock: 0

  # ── Custom L1s ───────────────────────────────────────────────────────
  # Add any Avalanche L1 chain on either network:
  # - name: "My L1 (Fuji)"
  #   blockchainId: "..."
  #   evmChainId: ...
  #   rpcUrl: "https://..."
  #   teleporterAddress: "0x253b2784c75e510dD0fF1da844684a1aC0aa5fcf"
  #   startBlock: 0

# Optional: relayer Prometheus metrics endpoint
# relayer:
#   metricsUrl: "http://relayer:9090/metrics"

# Optional: signature aggregator Prometheus metrics endpoint
# sigagg:
#   metricsUrl: "http://sigagg:8081/metrics"

logLevel: "info"

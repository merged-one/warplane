<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" fill="none">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <!-- Radar sweep gradient -->
    <radialGradient id="radar-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#22d3ee" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <!-- Flight path gradient -->
    <linearGradient id="path-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="30%" stop-color="#22d3ee" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#a78bfa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="path-grad-2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0"/>
      <stop offset="30%" stop-color="#34d399" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#22d3ee" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <!-- Node glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-lg">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <!-- Radar ring pattern -->
    <clipPath id="radar-clip">
      <rect x="0" y="0" width="900" height="280"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid overlay -->
  <rect width="900" height="280" fill="url(#grid)" opacity="0.3" rx="12"/>

  <!-- Radar rings (centered at 720, 140) -->
  <g clip-path="url(#radar-clip)" opacity="0.4">
    <circle cx="720" cy="140" r="60" stroke="#22d3ee" stroke-width="0.5" fill="none" opacity="0.3"/>
    <circle cx="720" cy="140" r="110" stroke="#22d3ee" stroke-width="0.5" fill="none" opacity="0.2"/>
    <circle cx="720" cy="140" r="160" stroke="#22d3ee" stroke-width="0.5" fill="none" opacity="0.15"/>
    <circle cx="720" cy="140" r="210" stroke="#22d3ee" stroke-width="0.5" fill="none" opacity="0.1"/>
    <!-- Radar sweep -->
    <circle cx="720" cy="140" r="160" fill="url(#radar-glow)"/>
    <!-- Crosshairs -->
    <line x1="720" y1="0" x2="720" y2="280" stroke="#22d3ee" stroke-width="0.3" opacity="0.2"/>
    <line x1="560" y1="140" x2="880" y2="140" stroke="#22d3ee" stroke-width="0.3" opacity="0.2"/>
  </g>

  <!-- Flight paths (message traces between chains) -->
  <!-- Path 1: curved arc top -->
  <path d="M 80 90 Q 300 30 520 80" stroke="url(#path-grad)" stroke-width="1.5" fill="none" stroke-dasharray="6 4" opacity="0.7"/>
  <!-- Path 2: curved arc bottom -->
  <path d="M 120 190 Q 340 240 560 180" stroke="url(#path-grad-2)" stroke-width="1.5" fill="none" stroke-dasharray="6 4" opacity="0.6"/>
  <!-- Path 3: straight diagonal -->
  <path d="M 200 120 L 480 150" stroke="#22d3ee" stroke-width="1" fill="none" stroke-dasharray="4 6" opacity="0.3"/>

  <!-- Chain nodes (L1s) -->
  <!-- Source chain nodes -->
  <g filter="url(#glow)">
    <circle cx="80" cy="90" r="5" fill="#22d3ee" opacity="0.9"/>
    <circle cx="80" cy="90" r="8" stroke="#22d3ee" stroke-width="0.5" fill="none" opacity="0.4"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="120" cy="190" r="5" fill="#34d399" opacity="0.9"/>
    <circle cx="120" cy="190" r="8" stroke="#34d399" stroke-width="0.5" fill="none" opacity="0.4"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="200" cy="120" r="4" fill="#a78bfa" opacity="0.7"/>
    <circle cx="200" cy="120" r="7" stroke="#a78bfa" stroke-width="0.5" fill="none" opacity="0.3"/>
  </g>

  <!-- Destination chain nodes -->
  <g filter="url(#glow)">
    <circle cx="520" cy="80" r="5" fill="#a78bfa" opacity="0.9"/>
    <circle cx="520" cy="80" r="8" stroke="#a78bfa" stroke-width="0.5" fill="none" opacity="0.4"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="560" cy="180" r="5" fill="#22d3ee" opacity="0.9"/>
    <circle cx="560" cy="180" r="8" stroke="#22d3ee" stroke-width="0.5" fill="none" opacity="0.4"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="480" cy="150" r="4" fill="#22d3ee" opacity="0.6"/>
    <circle cx="480" cy="150" r="7" stroke="#22d3ee" stroke-width="0.5" fill="none" opacity="0.3"/>
  </g>

  <!-- Message dots traveling along paths -->
  <circle cx="260" cy="52" r="3" fill="#22d3ee" opacity="0.9" filter="url(#glow)"/>
  <circle cx="380" cy="222" r="3" fill="#34d399" opacity="0.9" filter="url(#glow)"/>

  <!-- Radar blips on radar display -->
  <g filter="url(#glow)">
    <circle cx="695" cy="105" r="3" fill="#22d3ee" opacity="0.8"/>
    <circle cx="750" cy="160" r="2.5" fill="#34d399" opacity="0.7"/>
    <circle cx="680" cy="170" r="2" fill="#a78bfa" opacity="0.6"/>
    <circle cx="760" cy="110" r="2" fill="#f59e0b" opacity="0.5"/>
  </g>

  <!-- Status indicators (bottom-right) -->
  <g transform="translate(790, 220)" opacity="0.5">
    <circle cx="0" cy="0" r="3" fill="#34d399"/>
    <text x="8" y="4" font-family="monospace" font-size="9" fill="#94a3b8">5 CHAINS</text>
    <circle cx="0" cy="16" r="3" fill="#22d3ee"/>
    <text x="8" y="20" font-family="monospace" font-size="9" fill="#94a3b8">11 EVENTS</text>
    <circle cx="0" cy="32" r="3" fill="#a78bfa"/>
    <text x="8" y="36" font-family="monospace" font-size="9" fill="#94a3b8">TRACING</text>
  </g>

  <!-- Horizontal scan line -->
  <line x1="40" y1="240" x2="600" y2="240" stroke="#1e293b" stroke-width="1"/>
  <line x1="40" y1="240" x2="280" y2="240" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>

  <!-- Title -->
  <text x="60" y="148" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1">
    WARPLANE
  </text>

  <!-- Tagline -->
  <text x="62" y="178" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#94a3b8" letter-spacing="3" font-weight="300">
    INTERCHAIN CONTROL PLANE
  </text>

  <!-- Subtitle -->
  <text x="62" y="206" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b" letter-spacing="1">
    Cross-chain observability for Avalanche L1s
  </text>

  <!-- Subtle top border accent -->
  <rect x="0" y="0" width="900" height="2" fill="#22d3ee" opacity="0.4" rx="1"/>

  <!-- Corner brackets (control tower HUD feel) -->
  <g stroke="#22d3ee" stroke-width="1" opacity="0.2">
    <!-- Top-left -->
    <path d="M 16 28 L 16 16 L 28 16"/>
    <!-- Top-right -->
    <path d="M 884 28 L 884 16 L 872 16"/>
    <!-- Bottom-left -->
    <path d="M 16 252 L 16 264 L 28 264"/>
    <!-- Bottom-right -->
    <path d="M 884 252 L 884 264 L 872 264"/>
  </g>
</svg>

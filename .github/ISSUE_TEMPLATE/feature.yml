name: Feature Request
description: Propose a new feature or capability
title: "[Feature]: "
labels: ["type: feature", "status: triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please fill out the sections below.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Who is affected?
      placeholder: "As an L1 operator, I need to..."
    validations:
      required: true

  - type: textarea
    id: user-value
    attributes:
      label: User value
      description: Why is this valuable? What does the user gain?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: Describe the feature and how it should work.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is in scope and out of scope for this feature?
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: How do we know this is done?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true

  - type: textarea
    id: risks
    attributes:
      label: Risks and open questions
      description: What could go wrong? What do we not know yet?
    validations:
      required: false

  - type: dropdown
    id: packages
    attributes:
      label: Affected packages
      description: Which packages does this touch?
      multiple: true
      options:
        - packages/domain
        - packages/storage
        - packages/ingest
        - packages/cli
        - packages/docs-mcp
        - apps/api
        - apps/web
        - apps/docs
        - harness/tmpnet
        - scripts
        - root config
    validations:
      required: true

  - type: dropdown
    id: adr-impact
    attributes:
      label: ADR / docs impact
      description: Does this require a new ADR or docs update?
      options:
        - No impact
        - Docs update needed
        - New ADR required
        - Existing ADR update needed
    validations:
      required: true

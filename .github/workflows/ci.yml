name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  GO_VERSION: "1.22"

jobs:
  # ── Node: build, lint, test ────────────────────────────────────────
  ci:
    name: Build · Lint · Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Format check
        run: pnpm format:check

      - name: Unit tests
        run: pnpm test

      # ── API integration smoke test ──
      - name: API integration test
        run: |
          # Start API in background with demo seeding
          DEMO_MODE=true node --import tsx apps/api/src/index.ts &
          API_PID=$!

          # Wait for API to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3100/healthz > /dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          echo "=== /healthz ==="
          curl -sf http://localhost:3100/healthz | jq .

          echo "=== /api/v1/chains ==="
          curl -sf http://localhost:3100/api/v1/chains | jq .

          echo "=== /api/v1/traces ==="
          TRACES=$(curl -sf http://localhost:3100/api/v1/traces)
          echo "$TRACES" | jq .
          COUNT=$(echo "$TRACES" | jq '.total')
          if [ "$COUNT" -lt 1 ]; then
            echo "ERROR: Expected seeded traces, got $COUNT"
            kill $API_PID 2>/dev/null || true
            exit 1
          fi
          echo "Found $COUNT traces ✓"

          echo "=== /api/v1/scenarios ==="
          curl -sf http://localhost:3100/api/v1/scenarios | jq .

          echo "=== /api/v1/network ==="
          curl -sf http://localhost:3100/api/v1/network | jq .

          echo "=== /openapi.json ==="
          curl -sf http://localhost:3100/openapi.json | jq '.info.title'

          kill $API_PID 2>/dev/null || true
          echo "API integration tests passed ✓"

      # ── CLI smoke test ──
      - name: CLI smoke test
        run: |
          # Build CLI and link
          pnpm --filter @warplane/cli run build
          node packages/cli/dist/index.js --help
          echo "CLI --help passed ✓"

      # ── Docs build ──
      - name: Build docs site
        run: pnpm docs:build

      # ── LLMs generation check ──
      - name: Verify llms.txt generation
        run: |
          pnpm docs:llms
          if ! git diff --quiet llms.txt llms-full.txt docs/ai/context-map.json; then
            echo "ERROR: llms.txt / llms-full.txt / context-map.json are out of date."
            echo "Run 'pnpm docs:llms' and commit the changes."
            git diff --stat llms.txt llms-full.txt docs/ai/context-map.json
            exit 1
          fi
          echo "llms generation is up to date ✓"

      # ── ADR validation ──
      - name: Validate ADRs
        run: |
          exit_code=0
          required_sections=(
            "## Status"
            "## Date"
            "## Context and Problem Statement"
            "## Decision Drivers"
            "## Considered Options"
            "## Decision Outcome"
          )

          for adr in docs/decisions/[0-9][0-9][0-9][0-9]-*.md; do
            [ -f "$adr" ] || continue
            echo "Validating: $adr"

            for section in "${required_sections[@]}"; do
              if ! grep -q "^${section}$" "$adr"; then
                echo "  ERROR: Missing required section: ${section}"
                exit_code=1
              fi
            done

            basename=$(basename "$adr")
            if ! echo "$basename" | grep -qE '^[0-9]{4}-[a-z0-9-]+\.md$'; then
              echo "  ERROR: Filename must match pattern NNNN-slug.md"
              exit_code=1
            fi

            status=$(grep -A3 "^## Status$" "$adr" | grep -v "^## Status$" | grep -v "^$" | head -1 | xargs)
            case "$status" in
              Proposed|Accepted|Deprecated|Superseded*) ;;
              *)
                echo "  ERROR: Invalid status '${status}'."
                exit_code=1
                ;;
            esac

            date_line=$(grep -A3 "^## Date$" "$adr" | grep -v "^## Date$" | grep -v "^$" | head -1 | xargs)
            if ! echo "$date_line" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
              echo "  ERROR: Date must be YYYY-MM-DD, got '${date_line}'"
              exit_code=1
            fi

            echo "  OK"
          done

          exit $exit_code

  # ── Go harness ─────────────────────────────────────────────────────
  go-harness:
    name: Go Harness
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: harness/tmpnet/go.sum

      - name: Build
        working-directory: harness/tmpnet
        run: go build ./...

      - name: Vet
        working-directory: harness/tmpnet
        run: go vet ./...

      - name: Test (non-E2E)
        working-directory: harness/tmpnet
        run: go test ./...

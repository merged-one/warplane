name: ADR Validation

on:
  pull_request:
    paths:
      - "docs/decisions/*.md"
      - "!docs/decisions/README.md"
      - "!docs/decisions/templates/**"
  push:
    branches: [main]
    paths:
      - "docs/decisions/*.md"
      - "!docs/decisions/README.md"
      - "!docs/decisions/templates/**"

jobs:
  validate-adrs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate ADR structure
        run: |
          exit_code=0

          # Required sections in every ADR
          required_sections=(
            "## Status"
            "## Date"
            "## Context and Problem Statement"
            "## Decision Drivers"
            "## Considered Options"
            "## Decision Outcome"
          )

          for adr in docs/decisions/[0-9][0-9][0-9][0-9]-*.md; do
            [ -f "$adr" ] || continue
            echo "Validating: $adr"

            for section in "${required_sections[@]}"; do
              if ! grep -q "^${section}$" "$adr"; then
                echo "  ERROR: Missing required section: ${section}"
                exit_code=1
              fi
            done

            # Check filename pattern
            basename=$(basename "$adr")
            if ! echo "$basename" | grep -qE '^[0-9]{4}-[a-z0-9-]+\.md$'; then
              echo "  ERROR: Filename must match pattern NNNN-slug.md"
              exit_code=1
            fi

            # Check Status is one of the valid values (skip blank lines after heading)
            status=$(grep -A3 "^## Status$" "$adr" | grep -v "^## Status$" | grep -v "^$" | head -1 | xargs)
            case "$status" in
              Proposed|Accepted|Deprecated|Superseded*) ;;
              *)
                echo "  ERROR: Invalid status '${status}'. Must be Proposed, Accepted, Deprecated, or Superseded."
                exit_code=1
                ;;
            esac

            # Check Date is present and formatted (skip blank lines after heading)
            date_line=$(grep -A3 "^## Date$" "$adr" | grep -v "^## Date$" | grep -v "^$" | head -1 | xargs)
            if ! echo "$date_line" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
              echo "  ERROR: Date must be in YYYY-MM-DD format, got '${date_line}'"
              exit_code=1
            fi

            echo "  OK"
          done

          if [ $exit_code -ne 0 ]; then
            echo ""
            echo "ADR validation failed. See errors above."
          fi

          exit $exit_code
